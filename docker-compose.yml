services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/Paris
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - persona-net

  pythonscript:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: n8n-pythonscript
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - persona-net

  postgres:
    image: postgres:16
    container_name: n8n-postgres
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=n8n_auth
      - TZ=Europe/Paris
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - persona-net

  ollama:
    image: ollama/ollama:latest
    container_name: persona-ollama
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    networks:
      - persona-net

networks:
  persona-net:
    driver: bridge