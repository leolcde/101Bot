services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/Paris
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: always
 
  apis:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: n8n-apis
    ports:
      - "8000:8000"